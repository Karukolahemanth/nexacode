services:
  - type: web
    name: nexuside-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: VLLM_URL
        sync: false
      - key: VLLM_MODEL
        value: Qwen/Qwen3-35B-A3B
      - key: VLLM_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: vllm
      - key: DEBUG
        value: "false"
